name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install
      
      - name: Build
        run: cd frontend && npm run build
      
      - name: Copy public files to build
        run: |
          cp frontend/public/404.html frontend/build/
          cp frontend/public/robots.txt frontend/build/
          cp frontend/public/sitemap.xml frontend/build/
      
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/build
          clean: true